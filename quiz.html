<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Be My Valentine...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            animation: fadeIn 0.8s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #e91e63;
            font-size: 2.5em;
            margin-bottom: 20px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            10%, 30% {
                transform: scale(1.1);
            }
            20%, 40% {
                transform: scale(1);
            }
        }

        .message {
            color: #555;
            font-size: 1.3em;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .photo-grid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .photo-grid img:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 30px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .yes-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        .no-btn {
            background: #ddd;
            color: #999;
            pointer-events: none;
            opacity: 0.5;
            position: relative;
        }

        .no-btn::after {
            content: "🚫";
            position: absolute;
            top: -5px;
            right: -5px;
            font-size: 1.5em;
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .heart {
            position: absolute;
            font-size: 2em;
            animation: float 6s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            50% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .success-message {
            display: none;
            color: #e91e63;
            font-size: 1.5em;
            margin-top: 20px;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }
            .message {
                font-size: 1.1em;
            }
            button {
                padding: 12px 30px;
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <div class="hearts">
        <span class="heart" style="left: 10%; animation-delay: 0s;">💖</span>
        <span class="heart" style="left: 30%; animation-delay: 1s;">💕</span>
        <span class="heart" style="left: 50%; animation-delay: 2s;">💗</span>
        <span class="heart" style="left: 70%; animation-delay: 1.5s;">💓</span>
        <span class="heart" style="left: 85%; animation-delay: 0.5s;">💝</span>
    </div>

    <div class="container">
        <h1>Will You Be My Valentine?</h1>

        <p class="message">
          Pictures from when you loved me ↓
        </p>

        <div class="photo-grid">
            <img src="/images/IMG_9581.JPG" alt="DIA">
            <img src="/images/IMG_9703.JPG" alt="Library">
            <img src="/images/IMG_9612.JPG" alt="DIA 2">
        </div>

        <p class="message">
            Choose wisely Audrey...
        </p>

        <div class="button-container">
            <button class="yes-btn" onclick="sayYes()">Yes</button>
            <button class="no-btn">No 💔</button>
        </div>

        <div class="success-message" id="successMessage">
            Thanks beast ❤️ I love you so much
        </div>
    </div>

    <script>
        function sayYes() {
            document.getElementById('successMessage').style.display = 'block';

            // Create confetti effect
            for (let i = 0; i < 50; i++) {
                createConfetti();
            }
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.style.position = 'fixed';
            confetti.style.left = Math.random() * 100 + '%';
            confetti.style.top = '-10px';
            confetti.style.fontSize = '2em';
            confetti.innerHTML = ['🎊', '🎉', '🥳'][Math.floor(Math.random() * 7)];
            confetti.style.pointerEvents = 'none';
            confetti.style.animation = `float ${3 + Math.random() * 3}s linear forwards`;
            document.body.appendChild(confetti);

            setTimeout(() => {
                confetti.remove();
            }, 6000);
        }

        // Make the No button even more unclickable
        document.querySelector('.no-btn').addEventListener('mouseover', function(e) {
            e.preventDefault();
            return false;
        });

        document.querySelector('.no-btn').addEventListener('click', function(e) {
            e.preventDefault();
            return false;
        });
    </script>
</body>
</html>
